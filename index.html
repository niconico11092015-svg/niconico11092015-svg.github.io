<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mueblería Conca">
<title>La Mueblería Conca</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--marron:#4A2C0A;--marron2:#6B3F18;--naranja:#C4621A;--naranja2:#E8832A;
--crema:#FDF6EE;--crema2:#F5E8D5;--crema3:#EDD8BC;
--verde:#2A5C32;--verde2:#3A7A45;--verde-cl:#EAF3EC;
--rojo:#9B1C1C;--rojo-cl:#FEF2F2;--azul:#1A3A5C;--azul-cl:#EEF4FB;
--amarillo:#92620A;--amarillo-cl:#FEF9E7;
--blanco:#FFF;--gris:#6B7280;--gris-cl:#F9F7F4;
--sombra:0 2px 16px rgba(74,44,10,.10);--radio:14px;--radio2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--crema2);color:var(--marron);min-height:100vh;overscroll-behavior:none;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
.topbar{background:var(--marron);padding:16px 20px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar-back{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar h1{font-family:'Playfair Display',serif;font-size:18px;color:#fff;flex:1;line-height:1.2;}
.topbar p{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.topbar-icon{font-size:22px;flex-shrink:0;}
.content{flex:1;padding:20px 16px 100px;overflow-y:auto;}
.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--marron);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;background:none;border:none;color:rgba(255,255,255,.5);padding:10px 4px 8px;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
.nav-btn .nav-ico{font-size:18px;}
.nav-btn.active{color:var(--naranja2);}
.nav-btn:active{opacity:.7;}
.home-header{background:var(--marron);padding:28px 20px 32px;position:relative;overflow:hidden;}
.home-header::before{content:'';position:absolute;right:-20px;top:-20px;width:140px;height:140px;background:rgba(196,98,26,.18);border-radius:50%;}
.home-logo{width:52px;height:52px;background:var(--naranja);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:12px;box-shadow:0 4px 16px rgba(196,98,26,.4);}
.home-header h1{font-family:'Playfair Display',serif;font-size:24px;color:#fff;line-height:1.2;}
.home-header p{font-size:13px;color:rgba(255,255,255,.55);margin-top:4px;}
.home-content{padding:20px 16px 100px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.stat-card{background:var(--blanco);border-radius:var(--radio);padding:16px;box-shadow:var(--sombra);}
.stat-card .s-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:4px;}
.stat-card .s-label{font-size:11px;font-weight:500;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;}
.stat-card.presup .s-num{color:var(--naranja);}
.stat-card.cc .s-num{color:var(--verde2);}
.stat-card.ot .s-num{color:var(--azul);}
.stat-card.saldo{grid-column:1/-1;background:var(--rojo);cursor:pointer;}
.stat-card.saldo .s-num{color:#fff;font-size:32px;}
.stat-card.saldo .s-label{color:rgba(255,255,255,.7);}
.section-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--marron);margin-bottom:12px;padding-left:2px;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.menu-card{background:var(--blanco);border-radius:var(--radio);padding:16px 10px;text-align:center;cursor:pointer;box-shadow:var(--sombra);border:none;font-family:'DM Sans',sans-serif;transition:transform .15s;}
.menu-card:active{transform:scale(.96);}
.menu-card .mc-ico{font-size:28px;margin-bottom:6px;}
.menu-card .mc-label{font-size:11px;font-weight:600;color:var(--marron2);line-height:1.3;}
.search-bar{background:var(--blanco);border-radius:12px;display:flex;align-items:center;padding:10px 14px;gap:8px;margin-bottom:14px;box-shadow:var(--sombra);}
.search-bar input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;flex:1;color:var(--marron);background:transparent;}
.search-bar input::placeholder{color:#BBADA0;}
.lista{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--blanco);border-radius:var(--radio);padding:14px 16px;box-shadow:var(--sombra);cursor:pointer;border-left:4px solid transparent;transition:transform .15s;position:relative;}
.item-card:active{transform:scale(.98);}
.item-card.presup{border-left-color:var(--naranja);}
.item-card.cc{border-left-color:var(--verde2);}
.item-card.ot{border-left-color:var(--azul);}
.item-card.cobro-ot{border-left-color:var(--azul);}
.item-card.cobro-cc{border-left-color:var(--verde2);}
.semaforo-dot{position:absolute;top:12px;right:12px;width:12px;height:12px;border-radius:50%;}
.sem-verde{background:#22C55E;}
.sem-amarillo{background:#F59E0B;}
.sem-rojo{background:#EF4444;}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.item-codigo{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;opacity:.6;}
.item-fecha{font-size:11px;color:var(--gris);padding-right:20px;}
.item-nombre{font-weight:600;font-size:15px;margin-bottom:3px;color:var(--marron);}
.item-desc{font-size:13px;color:var(--gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--crema2);}
.item-total{font-weight:700;font-size:15px;color:var(--marron2);}
.item-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
.badge-pend{background:var(--crema2);color:var(--marron2);}
.badge-env{background:#FEF3C7;color:#92400E;}
.badge-ok{background:var(--verde-cl);color:var(--verde);}
.badge-prog{background:var(--azul-cl);color:var(--azul);}
.badge-rojo{background:var(--rojo-cl);color:var(--rojo);}
.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;background:var(--naranja);border-radius:50%;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(196,98,26,.5);display:flex;align-items:center;justify-content:center;z-index:150;transition:transform .15s;}
.fab:active{transform:scale(.92);}
.empty-state{text-align:center;padding:48px 20px;color:var(--gris);}
.empty-state .e-ico{font-size:48px;margin-bottom:12px;opacity:.5;}
.form-card{background:var(--blanco);border-radius:var(--radio);padding:20px;box-shadow:var(--sombra);margin-bottom:14px;}
.form-card h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--marron2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--crema2);}
.form-row{margin-bottom:14px;}
.form-row:last-child{margin-bottom:0;}
.form-row label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--marron2);margin-bottom:5px;opacity:.7;}
.form-row input,.form-row select,.form-row textarea{width:100%;border:1.5px solid var(--crema3);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--marron);background:var(--crema);outline:none;transition:border-color .2s;-webkit-appearance:none;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--naranja);background:#fff;}
.form-row textarea{resize:none;height:72px;}
.form-row.readonly input{background:var(--crema2);color:var(--naranja);font-weight:600;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.nombre-archivo{background:var(--crema2);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--naranja);word-break:break-all;margin-top:8px;border:1.5px dashed var(--crema3);}
.nombre-archivo span{font-weight:400;color:var(--gris);font-size:11px;display:block;margin-bottom:2px;}
.tabla-header{display:grid;gap:6px;padding:8px 10px;background:var(--marron);border-radius:10px 10px 0 0;font-size:10px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase;}
.tabla-header.compras{grid-template-columns:90px 1fr 45px 80px 80px 28px;}
.tabla-header.pagos{grid-template-columns:90px 1fr 70px 80px 28px;}
.tabla-header.pagos-ot{grid-template-columns:90px 1fr 80px 28px;}
.tabla-fila{display:grid;gap:6px;padding:6px 10px;background:var(--blanco);border-bottom:1px solid var(--crema2);align-items:center;}
.tabla-fila.compras{grid-template-columns:90px 1fr 45px 80px 80px 28px;}
.tabla-fila.pagos{grid-template-columns:90px 1fr 70px 80px 28px;}
.tabla-fila.pagos-ot{grid-template-columns:90px 1fr 80px 28px;}
.tabla-fila:last-child{border-radius:0 0 10px 10px;border-bottom:none;}
.tabla-fila input{border:1px solid var(--crema3);border-radius:6px;padding:5px 6px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--marron);background:var(--crema);outline:none;width:100%;}
.tabla-fila input:focus{border-color:var(--naranja);background:#fff;}
.total-cell{font-size:12px;font-weight:700;color:var(--marron2);text-align:right;}
.saldo-cell{font-size:12px;font-weight:700;color:var(--rojo);text-align:right;}
.del-btn{background:none;border:none;color:#DDD;font-size:16px;cursor:pointer;padding:2px;}
.del-btn:active{color:var(--rojo);}
.tabla-total{background:var(--marron);border-radius:0 0 10px 10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);}
.tabla-total .tv{color:#fff;font-size:16px;font-weight:700;}
.add-row-btn{background:none;border:1.5px dashed var(--crema3);border-radius:8px;padding:8px;width:100%;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gris);cursor:pointer;margin-top:8px;}
.add-row-btn:active{border-color:var(--naranja);color:var(--naranja);}
.resumen-box{background:var(--blanco);border-radius:var(--radio);overflow:hidden;box-shadow:var(--sombra);margin-bottom:14px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--crema2);}
.res-row:last-child{border-bottom:none;}
.res-row .rl{font-size:13px;color:var(--gris);}
.res-row .rv{font-size:16px;font-weight:700;}
.res-row.compras .rv{color:var(--marron2);}
.res-row.pagado .rv{color:var(--verde2);}
.saldo-final{background:var(--rojo);border-radius:var(--radio);padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.saldo-final .sf-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px;}
.saldo-final .sf-val{font-family:'Playfair Display',serif;font-size:28px;color:#fff;}
.btn-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.btn{flex:1;min-width:80px;padding:12px 8px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s;}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-primary{background:var(--naranja);color:#fff;}
.btn-secondary{background:var(--crema2);color:var(--marron2);}
.btn-danger{background:var(--rojo-cl);color:var(--rojo);}
.btn-pdf{background:var(--marron);color:#fff;}
.btn-verde{background:var(--verde-cl);color:var(--verde);}
.btn-azul{background:var(--azul-cl);color:var(--azul);}
.detalle-header{background:var(--blanco);border-radius:var(--radio);padding:16px;box-shadow:var(--sombra);margin-bottom:14px;}
.dh-codigo{font-size:11px;font-weight:700;color:var(--naranja);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.dh-nombre{font-family:'Playfair Display',serif;font-size:20px;color:var(--marron);margin-bottom:4px;}
.dh-desc{font-size:13px;color:var(--gris);}
.dh-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--crema2);}
.dh-fecha{font-size:12px;color:var(--gris);}
.dh-total{font-size:18px;font-weight:700;color:var(--marron);}
.img-preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-top:8px;}
.img-upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--crema2);border:1.5px dashed var(--crema3);border-radius:10px;padding:16px;cursor:pointer;font-size:13px;color:var(--gris);margin-top:8px;}
/* COBROS PENDIENTES */
.cobros-header{background:linear-gradient(135deg,var(--rojo) 0%,#7B0000 100%);border-radius:var(--radio);padding:20px;margin-bottom:16px;box-shadow:var(--sombra);}
.cobros-total-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.cobros-total-num{font-family:'Playfair Display',serif;font-size:36px;color:#fff;line-height:1;}
.cobros-sub{display:flex;gap:16px;margin-top:12px;}
.cobros-sub-item{flex:1;background:rgba(255,255,255,.12);border-radius:10px;padding:10px;}
.cobros-sub-item .csi-label{font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px;}
.cobros-sub-item .csi-val{font-size:16px;font-weight:700;color:#fff;margin-top:2px;}
.cobros-seccion-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--marron);margin:16px 0 8px;padding-left:2px;display:flex;align-items:center;gap:8px;}
.cobros-seccion-title .cs-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.cobro-card{background:var(--blanco);border-radius:var(--radio);padding:14px 16px;box-shadow:var(--sombra);margin-bottom:10px;border-left:4px solid transparent;}
.cobro-card.tipo-ot{border-left-color:var(--azul);}
.cobro-card.tipo-cc{border-left-color:var(--verde2);}
.cobro-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.cobro-codigo{font-size:10px;font-weight:700;letter-spacing:.8px;opacity:.6;}
.cobro-nombre{font-weight:600;font-size:15px;color:var(--marron);margin-bottom:2px;}
.cobro-desc{font-size:12px;color:var(--gris);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cobro-montos{display:flex;gap:8px;flex-wrap:wrap;}
.cobro-monto-item{flex:1;min-width:80px;background:var(--crema2);border-radius:8px;padding:8px 10px;}
.cobro-monto-item .cm-label{font-size:9px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;}
.cobro-monto-item .cm-val{font-size:14px;font-weight:700;margin-top:1px;}
.cobro-monto-item.cm-saldo{background:var(--rojo-cl);}
.cobro-monto-item.cm-saldo .cm-val{color:var(--rojo);}
.cobro-monto-item.cm-pagado .cm-val{color:var(--verde2);}
.cobro-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--crema2);}
.cobro-btn{flex:1;padding:8px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.cobro-btn-pago{background:var(--verde-cl);color:var(--verde);}
.cobro-btn-pdf{background:var(--marron);color:#fff;}
.cobro-btn-ver{background:var(--azul-cl);color:var(--azul);}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--blanco);border-radius:16px;padding:24px;width:100%;max-width:340px;max-height:80vh;overflow-y:auto;}
.modal-box h3{font-family:'Playfair Display',serif;color:var(--marron);margin-bottom:16px;}
/* PRINT */
@media print{
.navbar,.fab,.topbar-back,.btn-row,.add-row-btn,.del-btn,.nav-btn,.modal-overlay{display:none!important;}
body{background:white;}
.screen{display:none!important;}
#print-area{display:block!important;}
}
#print-area{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.screen.active .content>*{animation:fadeUp .25s ease both;}
.screen.active .content>*:nth-child(2){animation-delay:.04s;}
.screen.active .content>*:nth-child(3){animation-delay:.08s;}
</style>
</head>
<body>
<!-- PRINT AREA -->
<div id="print-area"></div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-logo">MC</div>
    <h1>La Mueblería Conca</h1>
    <p>Concarán, San Luis · Panel de gestión</p>
  </div>
  <div class="home-content">
    <div class="stats-grid">
      <div class="stat-card presup"><div class="s-num" id="stat-presup">0</div><div class="s-label">Presupuestos</div></div>
      <div class="stat-card cc"><div class="s-num" id="stat-cc">0</div><div class="s-label">Ctas. Corrientes</div></div>
      <div class="stat-card ot"><div class="s-num" id="stat-ot">0</div><div class="s-label">Órdenes Trabajo</div></div>
      <div class="stat-card saldo" onclick="irA('cobros')"><div class="s-num" id="stat-saldo">$ 0</div><div class="s-label">⚠ Saldo total a cobrar · Ver detalle →</div></div>
    </div>
    <p class="section-title">Accesos rápidos</p>
    <div class="menu-grid">
      <button class="menu-card" onclick="irA('presupuestos')"><div class="mc-ico">📋</div><div class="mc-label">Presupuestos</div></button>
      <button class="menu-card" onclick="irA('cuentas')"><div class="mc-ico">💰</div><div class="mc-label">Ctas. Corrientes</div></button>
      <button class="menu-card" onclick="irA('ordenes')"><div class="mc-ico">🔧</div><div class="mc-label">Órdenes Trabajo</div></button>
      <button class="menu-card" onclick="irA('horas')"><div class="mc-ico">⏱</div><div class="mc-label">Banco de Horas</div></button>
      <button class="menu-card" onclick="irA('cobros')"><div class="mc-ico">💵</div><div class="mc-label">Cobros Pendientes</div></button>
      <button class="menu-card" onclick="irA('pedidos')"><div class="mc-ico">📦</div><div class="mc-label">Pedidos Proveedores</div></button>
    </div>
  </div>
</div>

<!-- PRESUPUESTOS -->
<div id="screen-presupuestos" class="screen">
  <div class="topbar"><div class="topbar-icon">📋</div><div><h1>Presupuestos</h1></div></div>
  <div class="content">
    <div class="search-bar"><span>🔍</span><input type="text" placeholder="Buscar..." id="buscar-presup" oninput="renderLista('presupuestos')"></div>
    <div class="lista" id="lista-presupuestos"></div>
  </div>
  <button class="fab" onclick="abrirForm('presupuestos',null)">＋</button>
</div>

<!-- CUENTAS -->
<div id="screen-cuentas" class="screen">
  <div class="topbar"><div class="topbar-icon">💰</div><div><h1>Cuentas Corrientes</h1></div></div>
  <div class="content">
    <div class="search-bar"><span>🔍</span><input type="text" placeholder="Buscar..." id="buscar-cc" oninput="renderLista('cuentas')"></div>
    <div class="lista" id="lista-cuentas"></div>
  </div>
  <button class="fab" onclick="abrirForm('cuentas',null)">＋</button>
</div>

<!-- ORDENES -->
<div id="screen-ordenes" class="screen">
  <div class="topbar"><div class="topbar-icon">🔧</div><div><h1>Órdenes de Trabajo</h1></div></div>
  <div class="content">
    <div class="search-bar"><span>🔍</span><input type="text" placeholder="Buscar..." id="buscar-ot" oninput="renderLista('ordenes')"></div>
    <div class="lista" id="lista-ordenes"></div>
  </div>
  <button class="fab" onclick="abrirForm('ordenes',null)">＋</button>
</div>

<!-- COBROS PENDIENTES -->
<div id="screen-cobros" class="screen">
  <div class="topbar"><div class="topbar-icon">💵</div><div><h1>Cobros Pendientes</h1></div></div>
  <div class="content" id="cobros-content"></div>
</div>
