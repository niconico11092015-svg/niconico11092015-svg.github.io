<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mueblería Conca">
<title>La Mueblería Conca</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
--marron:#4A2C0A;--marron2:#6B3F18;--naranja:#C4621A;--naranja2:#E8832A;
--crema:#FDF6EE;--crema2:#F5E8D5;--crema3:#EDD8BC;
--verde:#2A5C32;--verde2:#3A7A45;--verde-cl:#EAF3EC;
--rojo:#9B1C1C;--rojo-cl:#FEF2F2;--azul:#1A3A5C;--azul-cl:#EEF4FB;
--amarillo:#92620A;--amarillo-cl:#FEF9E7;
--blanco:#FFF;--gris:#6B7280;--gris-cl:#F9F7F4;
--sombra:0 2px 16px rgba(74,44,10,.10);--radio:14px;--radio2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--crema2);color:var(--marron);min-height:100vh;overscroll-behavior:none;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
.topbar{background:var(--marron);padding:16px 20px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.topbar-back{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar h1{font-family:'Playfair Display',serif;font-size:18px;color:#fff;flex:1;line-height:1.2;}
.topbar p{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.topbar-icon{font-size:22px;flex-shrink:0;}
.content{flex:1;padding:20px 16px 100px;overflow-y:auto;}
.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--marron);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;background:none;border:none;color:rgba(255,255,255,.5);padding:10px 4px 8px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
.nav-btn .nav-ico{font-size:20px;}
.nav-btn.active{color:var(--naranja2);}
.nav-btn:active{opacity:.7;}
.home-header{background:var(--marron);padding:28px 20px 32px;position:relative;overflow:hidden;}
.home-header::before{content:'';position:absolute;right:-20px;top:-20px;width:140px;height:140px;background:rgba(196,98,26,.18);border-radius:50%;}
.home-logo{width:52px;height:52px;background:var(--naranja);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:12px;box-shadow:0 4px 16px rgba(196,98,26,.4);}
.home-header h1{font-family:'Playfair Display',serif;font-size:24px;color:#fff;line-height:1.2;}
.home-header p{font-size:13px;color:rgba(255,255,255,.55);margin-top:4px;}
.home-content{padding:20px 16px 100px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.stat-card{background:var(--blanco);border-radius:var(--radio);padding:16px;box-shadow:var(--sombra);}
.stat-card .s-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:4px;}
.stat-card .s-label{font-size:11px;font-weight:500;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;}
.stat-card.presup .s-num{color:var(--naranja);}
.stat-card.cc .s-num{color:var(--verde2);}
.stat-card.ot .s-num{color:var(--azul);}
.stat-card.saldo{grid-column:1/-1;background:var(--rojo);}
.stat-card.saldo .s-num{color:#fff;font-size:32px;}
.stat-card.saldo .s-label{color:rgba(255,255,255,.7);}
.section-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--marron);margin-bottom:12px;padding-left:2px;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.menu-card{background:var(--blanco);border-radius:var(--radio);padding:16px 10px;text-align:center;cursor:pointer;box-shadow:var(--sombra);border:none;font-family:'DM Sans',sans-serif;transition:transform .15s;}
.menu-card:active{transform:scale(.96);}
.menu-card .mc-ico{font-size:28px;margin-bottom:6px;}
.menu-card .mc-label{font-size:11px;font-weight:600;color:var(--marron2);line-height:1.3;}
.search-bar{background:var(--blanco);border-radius:12px;display:flex;align-items:center;padding:10px 14px;gap:8px;margin-bottom:14px;box-shadow:var(--sombra);}
.search-bar input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;flex:1;color:var(--marron);background:transparent;}
.search-bar input::placeholder{color:#BBADA0;}
.lista{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--blanco);border-radius:var(--radio);padding:14px 16px;box-shadow:var(--sombra);cursor:pointer;border-left:4px solid transparent;transition:transform .15s;position:relative;}
.item-card:active{transform:scale(.98);}
.item-card.presup{border-left-color:var(--naranja);}
.item-card.cc{border-left-color:var(--verde2);}
.item-card.ot{border-left-color:var(--azul);}
.semaforo-dot{position:absolute;top:12px;right:12px;width:12px;height:12px;border-radius:50%;}
.sem-verde{background:#22C55E;}
.sem-amarillo{background:#F59E0B;}
.sem-rojo{background:#EF4444;}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.item-codigo{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;opacity:.6;}
.item-fecha{font-size:11px;color:var(--gris);padding-right:20px;}
.item-nombre{font-weight:600;font-size:15px;margin-bottom:3px;color:var(--marron);}
.item-desc{font-size:13px;color:var(--gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--crema2);}
.item-total{font-weight:700;font-size:15px;color:var(--marron2);}
.item-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
.badge-pend{background:var(--crema2);color:var(--marron2);}
.badge-env{background:#FEF3C7;color:#92400E;}
.badge-ok{background:var(--verde-cl);color:var(--verde);}
.badge-prog{background:var(--azul-cl);color:var(--azul);}
.badge-rojo{background:var(--rojo-cl);color:var(--rojo);}
.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;background:var(--naranja);border-radius:50%;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(196,98,26,.5);display:flex;align-items:center;justify-content:center;z-index:150;transition:transform .15s;}
.fab:active{transform:scale(.92);}
.empty-state{text-align:center;padding:48px 20px;color:var(--gris);}
.empty-state .e-ico{font-size:48px;margin-bottom:12px;opacity:.5;}
.form-card{background:var(--blanco);border-radius:var(--radio);padding:20px;box-shadow:var(--sombra);margin-bottom:14px;}
.form-card h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--marron2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--crema2);}
.form-row{margin-bottom:14px;}
.form-row:last-child{margin-bottom:0;}
.form-row label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--marron2);margin-bottom:5px;opacity:.7;}
.form-row input,.form-row select,.form-row textarea{width:100%;border:1.5px solid var(--crema3);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--marron);background:var(--crema);outline:none;transition:border-color .2s;-webkit-appearance:none;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--naranja);background:#fff;}
.form-row textarea{resize:none;height:72px;}
.form-row.readonly input{background:var(--crema2);color:var(--naranja);font-weight:600;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.nombre-archivo{background:var(--crema2);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--naranja);word-break:break-all;margin-top:8px;border:1.5px dashed var(--crema3);}
.nombre-archivo span{font-weight:400;color:var(--gris);font-size:11px;display:block;margin-bottom:2px;}
.tabla-header{display:grid;gap:6px;padding:8px 10px;background:var(--marron);border-radius:10px 10px 0 0;font-size:10px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase;}
.tabla-header.compras{grid-template-columns:90px 1fr 45px 80px 80px 28px;}
.tabla-header.pagos{grid-template-columns:90px 1fr 70px 80px 28px;}
.tabla-fila{display:grid;gap:6px;padding:6px 10px;background:var(--blanco);border-bottom:1px solid var(--crema2);align-items:center;}
.tabla-fila.compras{grid-template-columns:90px 1fr 45px 80px 80px 28px;}
.tabla-fila.pagos{grid-template-columns:90px 1fr 70px 80px 28px;}
.tabla-fila:last-child{border-radius:0 0 10px 10px;border-bottom:none;}
.tabla-fila input{border:1px solid var(--crema3);border-radius:6px;padding:5px 6px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--marron);background:var(--crema);outline:none;width:100%;}
.tabla-fila input:focus{border-color:var(--naranja);background:#fff;}
.total-cell{font-size:12px;font-weight:700;color:var(--marron2);text-align:right;}
.saldo-cell{font-size:12px;font-weight:700;color:var(--rojo);text-align:right;}
.del-btn{background:none;border:none;color:#DDD;font-size:16px;cursor:pointer;padding:2px;}
.del-btn:active{color:var(--rojo);}
.tabla-total{background:var(--marron);border-radius:0 0 10px 10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);}
.tabla-total .tv{color:#fff;font-size:16px;font-weight:700;}
.add-row-btn{background:none;border:1.5px dashed var(--crema3);border-radius:8px;padding:8px;width:100%;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gris);cursor:pointer;margin-top:8px;}
.add-row-btn:active{border-color:var(--naranja);color:var(--naranja);}
.resumen-box{background:var(--blanco);border-radius:var(--radio);overflow:hidden;box-shadow:var(--sombra);margin-bottom:14px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--crema2);}
.res-row:last-child{border-bottom:none;}
.res-row .rl{font-size:13px;color:var(--gris);}
.res-row .rv{font-size:16px;font-weight:700;}
.res-row.compras .rv{color:var(--marron2);}
.res-row.pagado .rv{color:var(--verde2);}
.saldo-final{background:var(--rojo);border-radius:var(--radio);padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.saldo-final .sf-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px;}
.saldo-final .sf-val{font-family:'Playfair Display',serif;font-size:28px;color:#fff;}
.btn-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.btn{flex:1;min-width:80px;padding:12px 8px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:transform .15s,opacity .15s;}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-primary{background:var(--naranja);color:#fff;}
.btn-secondary{background:var(--crema2);color:var(--marron2);}
.btn-danger{background:var(--rojo-cl);color:var(--rojo);}
.btn-pdf{background:var(--marron);color:#fff;}
.btn-verde{background:var(--verde-cl);color:var(--verde);}
.detalle-header{background:var(--blanco);border-radius:var(--radio);padding:16px;box-shadow:var(--sombra);margin-bottom:14px;}
.dh-codigo{font-size:11px;font-weight:700;color:var(--naranja);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.dh-nombre{font-family:'Playfair Display',serif;font-size:20px;color:var(--marron);margin-bottom:4px;}
.dh-desc{font-size:13px;color:var(--gris);}
.dh-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--crema2);}
.dh-fecha{font-size:12px;color:var(--gris);}
.dh-total{font-size:18px;font-weight:700;color:var(--marron);}
.img-preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-top:8px;}
.img-upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--crema2);border:1.5px dashed var(--crema3);border-radius:10px;padding:16px;cursor:pointer;font-size:13px;color:var(--gris);margin-top:8px;}
/* Caja condición de pago */
.cond-pago-box{background:var(--azul-cl);border:1.5px solid #b8d0e8;border-radius:10px;padding:14px;margin-top:10px;}
.cond-pago-box .cp-titulo{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--azul);margin-bottom:10px;}
.cuotas-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.cuota-item{background:#fff;border-radius:8px;padding:10px 8px;text-align:center;border:1.5px solid #b8d0e8;}
.cuota-item .ci-num{font-size:10px;font-weight:600;color:var(--gris);text-transform:uppercase;}
.cuota-item .ci-val{font-size:15px;font-weight:700;color:var(--azul);margin:3px 0;}
.cuota-item .ci-sub{font-size:10px;color:var(--gris);}
/* Tabs órdenes */
.ot-tabs{display:flex;gap:6px;margin-bottom:14px;}
.ot-tab{flex:1;padding:8px 4px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;background:var(--blanco);color:var(--gris);box-shadow:var(--sombra);transition:all .2s;}
.ot-tab.active{background:var(--marron);color:#fff;}
.ot-tab .tab-num{display:block;font-size:18px;font-weight:700;line-height:1;margin-bottom:2px;}
/* Resumen banner */
.ot-banner{border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.ot-banner.rojo{background:var(--rojo-cl);border-left:4px solid var(--rojo);}
.ot-banner.verde{background:var(--verde-cl);border-left:4px solid var(--verde2);}
.ot-banner.amarillo{background:var(--amarillo-cl);border-left:4px solid var(--amarillo);}
.ot-chip{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.chip-rojo{background:var(--rojo-cl);color:var(--rojo);}
.chip-amarillo{background:var(--amarillo-cl);color:var(--amarillo);}
.chip-verde{background:var(--verde-cl);color:var(--verde);}
.chip-azul{background:var(--azul-cl);color:var(--azul);}
/* Tarjeta OT dinámica */
.ot-card{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .15s;}
.ot-card:active{transform:scale(.98);}
.ot-card-header{display:flex;align-items:stretch;}
.ot-sem{width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 6px;}
.ot-sem.sem-rojo{background:var(--rojo);}
.ot-sem.sem-amarillo{background:#F59E0B;}
.ot-sem.sem-verde{background:var(--verde2);}
.ot-sem.sem-gris{background:#9CA3AF;}
.ot-sem .dias-num{font-size:22px;font-weight:700;color:#fff;line-height:1;}
.ot-sem .dias-label{font-size:8px;font-weight:600;color:rgba(255,255,255,.75);text-transform:uppercase;text-align:center;margin-top:2px;}
.ot-body{flex:1;padding:12px 14px;}
.ot-body-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.ot-codigo{font-size:10px;font-weight:700;color:var(--naranja);letter-spacing:.8px;text-transform:uppercase;}
.ot-badges{display:flex;gap:4px;flex-wrap:wrap;}
.ot-nombre{font-weight:700;font-size:15px;color:var(--marron);margin-bottom:2px;}
.ot-desc{font-size:12px;color:var(--gris);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.ot-footer{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ot-info-chip{font-size:11px;color:var(--gris);display:flex;align-items:center;gap:3px;}
/* Cambio rápido de estado */
.ot-estado-btn{background:var(--crema2);border:1px solid var(--crema3);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--marron2);cursor:pointer;white-space:nowrap;}
.ot-estado-btn:active{background:var(--naranja);color:#fff;border-color:var(--naranja);}
/* Sección título */
.ot-seccion{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--marron2);opacity:.6;margin:16px 0 8px 2px;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--blanco);border-radius:16px;padding:24px;width:100%;max-width:340px;max-height:80vh;overflow-y:auto;}
.modal-box h3{font-family:'Playfair Display',serif;color:var(--marron);margin-bottom:16px;}
/* No se necesita CSS de impresión — se usa iframe */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.screen.active .content>*{animation:fadeUp .25s ease both;}
.screen.active .content>*:nth-child(2){animation-delay:.04s;}
.screen.active .content>*:nth-child(3){animation-delay:.08s;}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
<div class="home-header">
<div class="home-logo">MC</div>
<h1>La Mueblería Conca</h1>
<p>Concarán, San Luis · Panel de gestión</p>
</div>
<div class="home-content">
<div class="stats-grid">
<div class="stat-card presup"><div class="s-num" id="stat-presup">0</div><div class="s-label">Presupuestos</div></div>
<div class="stat-card cc"><div class="s-num" id="stat-cc">0</div><div class="s-label">Ctas. Corrientes</div></div>
<div class="stat-card ot"><div class="s-num" id="stat-ot">0</div><div class="s-label">Órdenes Trabajo</div></div>
<div class="stat-card saldo"><div class="s-num" id="stat-saldo">$ 0</div><div class="s-label">⚠ Saldo total a cobrar</div></div>
</div>
<p class="section-title">Accesos rápidos</p>
<div class="menu-grid">
<button class="menu-card" onclick="irA('presupuestos')"><div class="mc-ico">📋</div><div class="mc-label">Presupuestos</div></button>
<button class="menu-card" onclick="irA('cuentas')"><div class="mc-ico">💰</div><div class="mc-label">Ctas. Corrientes</div></button>
<button class="menu-card" onclick="irA('ordenes')"><div class="mc-ico">🔧</div><div class="mc-label">Órdenes Trabajo</div></button>
<button class="menu-card" onclick="irA('horas')"><div class="mc-ico">⏱</div><div class="mc-label">Banco de Horas</div></button>
<button class="menu-card" onclick="irA('pedidos')" style="grid-column:1/-1"><div class="mc-ico">📦</div><div class="mc-label">Pedidos a Proveedores</div></button>
</div>
</div>
</div>

<!-- PRESUPUESTOS -->
<div id="screen-presupuestos" class="screen">
<div class="topbar"><div class="topbar-icon">📋</div><div><h1>Presupuestos</h1></div></div>
<div class="content">
<div class="search-bar"><span>🔍</span><input type="text" placeholder="Buscar..." id="buscar-presup" oninput="renderLista('presupuestos')"></div>
<div class="lista" id="lista-presupuestos"></div>
</div>
<button class="fab" onclick="abrirForm('presupuestos',null)">＋</button>
</div>

<!-- CUENTAS -->
<div id="screen-cuentas" class="screen">
<div class="topbar"><div class="topbar-icon">💰</div><div><h1>Cuentas Corrientes</h1></div></div>
<div class="content">
<div class="search-bar"><span>🔍</span><input type="text" placeholder="Buscar..." id="buscar-cc" oninput="renderLista('cuentas')"></div>
<div class="lista" id="lista-cuentas"></div>
</div>
<button class="fab" onclick="abrirForm('cuentas',null)">＋</button>
</div>

<!-- ORDENES -->
<div id="screen-ordenes" class="screen">
<div class="topbar"><div class="topbar-icon">🔧</div><div><h1>Órdenes de Trabajo</h1></div></div>
<div class="content" id="ordenes-content"></div>
<button class="fab" onclick="abrirForm('ordenes',null)">＋</button>
</div>

<!-- HORAS -->
<div id="screen-horas" class="screen">
<div class="topbar"><div class="topbar-icon">⏱</div><div><h1>Banco de Horas</h1></div></div>

<script>
// ══ TASAS CUENTA CORRIENTE (configurables) ══
const TASAS_CC = {
  buenPagador:  { label: 'Cliente fiel / buen pagador', pct: 18 },
  conAtrasos:   { label: 'Con atrasos previos',         pct: 25 },
  sinHistorial: { label: 'Sin historial (primera vez)', pct: 35 }
};

// ══ DB ══
const DB={
  get(k){try{return JSON.parse(localStorage.getItem('mc_'+k)||'[]');}catch(e){return[];}},
  set(k,v){localStorage.setItem('mc_'+k,JSON.stringify(v));},
  nextNum(k){const i=this.get(k);return i.length?Math.max(...i.map(x=>x.num||0))+1:1;}
};

function fmt(n){return '$ '+Math.round(n||0).toLocaleString('es-AR');}
function fmtF(f){if(!f)return'';const[y,m,d]=f.split('-');return`${d}/${m}/${y}`;}
function hoy(){return new Date().toISOString().split('T')[0];}
function pre(t){return t==='presupuestos'?'PRE':t==='cuentas'?'CC':'OT';}
function nomArchivo(t,n,ap,no,de){
  const p=pre(t),num=String(n||'').padStart(3,'0');
  let r=`${p}-${num}`;
  if(ap)r+=`-${ap.trim()}`;
  if(no)r+=` ${no.trim()}`;
  if(de)r+=`-${de.trim().substring(0,25)}`;
  return r;
}

// ══ NAVEGACIÓN ══
let pantalla='home', historial=[];
function irA(p){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+p).classList.add('active');
  const nb=document.getElementById('nav-'+p);
  if(nb)nb.classList.add('active');
  document.getElementById('navbar').style.display='flex';
  pantalla=p;
  if(['presupuestos','cuentas'].includes(p))renderLista(p);
  if(p==='ordenes')renderOrdenes();
  if(p==='home')actualizarStats();
  if(p==='horas')renderHoras();
  if(p==='pedidos')renderPedidos();
}
function mostrarForm(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-form').classList.add('active');
  document.getElementById('navbar').style.display='none';
}
function mostrarDetalle(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-detalle').classList.add('active');
  document.getElementById('navbar').style.display='none';
}
function volverDeForm(){irA(pantalla);}
function volverDeDetalle(){irA(pantalla);}

// ══ STATS ══
function actualizarStats(){
  document.getElementById('stat-presup').textContent=DB.get('presupuestos').length;
  document.getElementById('stat-cc').textContent=DB.get('cuentas').length;
  document.getElementById('stat-ot').textContent=DB.get('ordenes').length;
  const saldo=DB.get('cuentas').reduce((s,cc)=>{
    const tc=(cc.compras||[]).reduce((a,c)=>a+((parseFloat(c.cant)||0)*(parseFloat(c.precio)||0)),0);
    const tp=(cc.pagos||[]).reduce((a,p)=>a+(parseFloat(p.monto)||0),0);
    return s+Math.max(0,tc-tp);
  },0);
  document.getElementById('stat-saldo').textContent=fmt(saldo);
}

// ══ SEMÁFORO ══
function calcSemaforo(item,tipo){
  const prioMap={'Urgente':3,'Alta':2,'Normal':1,'Baja':0};
  const prio=prioMap[item.prioridad]||0;
  let diasRestantes=999;
  const fechaEntrega=item.entrega||item.fechaEntrega;
  if(fechaEntrega){
    const hoyMs=new Date().setHours(0,0,0,0);
    const entMs=new Date(fechaEntrega).setHours(0,0,0,0);
    diasRestantes=Math.floor((entMs-hoyMs)/(1000*60*60*24));
  }
  const estadosOk=['Completado','Pagado','Entregado','Terminado'];
  if(estadosOk.includes(item.estado))return'verde';
  if(prio>=3||diasRestantes<0)return'rojo';
  if(prio>=2||diasRestantes<=3)return'amarillo';
  if(diasRestantes<=7)return'amarillo';
  return'verde';
}

// ══ LISTA ══
function badgeClass(estado){
  if(['Completado','Pagado','Entregado','Terminado'].includes(estado))return'badge-ok';
  if(['En progreso','Aprobado'].includes(estado))return'badge-prog';
  if(['Rechazado','Cancelado','En mora'].includes(estado))return'badge-rojo';
  if(estado==='Enviado')return'badge-env';
  return'badge-pend';
}

function renderLista(tipo){
  const items=DB.get(tipo);
  const busqId=tipo==='cuentas'?'buscar-cc':tipo==='presupuestos'?'buscar-presup':'buscar-ot';
  const busq=(document.getElementById(busqId)?.value||'').toLowerCase();
  const cont=document.getElementById('lista-'+tipo);
  const filtrados=items.filter(i=>`${i.apellido} ${i.nombre} ${i.desc} ${i.num}`.toLowerCase().includes(busq));
  if(!filtrados.length){
    cont.innerHTML=`<div class="empty-state"><div class="e-ico">${tipo==='presupuestos'?'📋':tipo==='cuentas'?'💰':'🔧'}</div><p>No hay registros.<br>Tocá ＋ para agregar.</p></div>`;
    return;
  }
  cont.innerHTML=filtrados.map(item=>{
    let total=0;
    if(tipo==='cuentas'){
      const tc=(item.compras||[]).reduce((a,c)=>a+((parseFloat(c.cant)||0)*(parseFloat(c.precio)||0)),0);
      const tp=(item.pagos||[]).reduce((a,p)=>a+(parseFloat(p.monto)||0),0);
      total=tc-tp;
    } else if(tipo==='presupuestos'){
      total=item.total||0;
    } else {
      total=item.costo||0;
    }
    const codigo=`${pre(tipo)}-${String(item.num).padStart(3,'0')}`;
    const sem=calcSemaforo(item,tipo);
    return `<div class="item-card ${tipo==='presupuestos'?'presup':tipo==='cuentas'?'cc':'ot'}" onclick="verDetalle('${tipo}',${item.id})">
<div class="semaforo-dot sem-${sem}"></div>
<div class="item-top"><span class="item-codigo">${codigo}</span><span class="item-fecha">${fmtF(item.fecha)}</span></div>
<div class="item-nombre">${item.apellido||''} ${item.nombre||''}</div>
<div class="item-desc">${item.desc||'—'}</div>
<div class="item-footer">
<span class="item-total">${fmt(total)}</span>
<span class="item-badge ${badgeClass(item.estado)}">${item.estado||'Pendiente'}</span>
</div>
</div>`;
  }).join('');
}

// ══ FORM ══
let formTipo='', formId=null, formItems=[], formCompras=[], formPagos=[], formImgData='';

function abrirForm(tipo, id){
  formTipo=tipo; formId=id;
  formItems=[]; formCompras=[]; formPagos=[]; formImgData='';
  const esEdicion=id!==null;
  const item=esEdicion?DB.get(tipo).find(i=>i.id===id):null;
  const num=esEdicion?(item?.num||1):DB.nextNum(tipo);
  const titulos={presupuestos:esEdicion?'Editar Presupuesto':'Nuevo Presupuesto',cuentas:esEdicion?'Editar Cuenta':'Nueva Cuenta Corriente',ordenes:esEdicion?'Editar Orden':'Nueva Orden de Trabajo'};
  document.getElementById('form-title').textContent=titulos[tipo];
  document.getElementById('form-subtitle').textContent=`${pre(tipo)}-${String(num).padStart(3,'0')}`;
  const cont=document.getElementById('form-content');
  if(tipo==='presupuestos')cont.innerHTML=buildFormPresup(num,item);
  else if(tipo==='cuentas')cont.innerHTML=buildFormCC(num,item);
  else cont.innerHTML=buildFormOT(num,item);
  if(esEdicion && item){
    if(tipo==='presupuestos'&&item.items){item.items.forEach(it=>agregarFilaPresup(it));}
    if(tipo==='cuentas'){
      if(item.compras)item.compras.forEach(c=>agregarFilaCompra(c));
      if(item.pagos)item.pagos.forEach(p=>agregarFilaPago(p));
    }
    if(item.imagen){formImgData=item.imagen;document.getElementById('img-preview')?.setAttribute('src',item.imagen);document.getElementById('img-preview')?.style.setProperty('display','block');}
  } else {
    if(tipo==='presupuestos')agregarFilaPresup();
    if(tipo==='cuentas'){agregarFilaCompra();agregarFilaPago();}
  }
  // Inicializar condición de pago en presupuestos
  if(tipo==='presupuestos'){
    actualizarCondPago();
  }
  mostrarForm();
  setTimeout(()=>actualizarNombreArchivo(),100);
}

function buildFormPresup(num,item){

  return`<div class="form-card"><h3>📋 Datos del cliente</h3>
<div class="form-grid">

</div>
<div class="form-grid">
<div class="form-row"><label>Apellido</label><input type="text" id="fp-apellido" value="${v('apellido')}" placeholder="Pérez" oninput="actualizarNombreArchivo()"></div>
<div class="form-row"><label>Nombre</label><input type="text" id="fp-nombre" value="${v('nombre')}" placeholder="Juan" oninput="actualizarNombreArchivo()"></div>
</div>
<div class="form-row"><label>Descripción del pedido</label><input type="text" id="fp-desc" value="${v('desc')}" placeholder="Ej: Mesa de comedor 1.40m" oninput="actualizarNombreArchivo()"></div>

<div class="nombre-archivo" id="fp-nombre-archivo"><span>Nombre del archivo:</span>PRE-${String(num).padStart(3,'0')}</div>
</div>
<div class="form-card"><h3>📦 Ítems del presupuesto</h3>
<div class="tabla-header compras"><span>Fecha</span><span>Descripción</span><span>Cant</span><span>P. Unit</span><span>Total</span><span></span></div>
<div id="fp-items"></div>
<div class="tabla-total"><span>TOTAL</span><span class="tv" id="fp-total">$ 0</span></div>
<button class="add-row-btn" onclick="agregarFilaPresup()">＋ Agregar ítem</button>
</div>
<div class="form-card"><h3>💳 Condición de pago</h3>
<div class="form-row">
<label>Forma de pago</label>
<select id="fp-condpago" onchange="actualizarCondPago()">
<option value="contado"${condPago==='contado'?' selected':''}>Contado</option>
<option value="cc"${condPago==='cc'?' selected':''}>Cuenta corriente (3 cuotas)</option>
</select>
</div>
<div id="fp-cc-opciones" style="display:${condPago==='cc'?'block':'none'}">
<div class="form-row">
<label>Perfil crediticio</label>
<select id="fp-perfil" onchange="actualizarCondPago()">
<option value="buenPagador"${perfilCC==='buenPagador'?' selected':''}>Cliente fiel / buen pagador (${TASAS_CC.buenPagador.pct}%)</option>
<option value="conAtrasos"${perfilCC==='conAtrasos'?' selected':''}>Con atrasos previos (${TASAS_CC.conAtrasos.pct}%)</option>
<option value="sinHistorial"${perfilCC==='sinHistorial'?' selected':''}>Sin historial — primera vez (${TASAS_CC.sinHistorial.pct}%)</option>
</select>
</div>
<div id="fp-cuotas-detalle"></div>
</div>
</div>
<div class="form-card"><h3>📝 Estado</h3>
<div class="form-grid">
<div class="form-row"><label>Estado</label>
<select id="fp-estado">
${['Pendiente','Enviado','Aprobado','Rechazado','En progreso','Completado'].map(e=>`<option${v('estado')==e?' selected':''}>${e}</option>`).join('')}
</select>
</div>
<div class="form-row"><label>Prioridad</label>
<select id="fp-prioridad">
${['Normal','Alta','Urgente','Baja'].map(e=>`<option${v('prioridad')==e?' selected':''}>${e}</option>`).join('')}
</select>
</div>
</div>
<div class="form-row"><label>Observaciones</label><textarea id="fp-obs" placeholder="Notas...">${v('obs')}</textarea></div>
</div>
<div class="btn-row">
<button class="btn btn-secondary" onclick="volverDeForm()">Cancelar</button>
<button class="btn btn-primary" onclick="guardarPresup(${num})">Guardar</button>
</div>`;
}

function actualizarCondPago(){
  const sel=document.getElementById('fp-condpago');
  const opts=document.getElementById('fp-cc-opciones');
  const det=document.getElementById('fp-cuotas-detalle');
  if(!sel)return;
  if(sel.value==='cc'){
    if(opts)opts.style.display='block';
    const perfilSel=document.getElementById('fp-perfil');
    const perfil=perfilSel?perfilSel.value:'sinHistorial';
    const tasa=TASAS_CC[perfil]||TASAS_CC.sinHistorial;
    // Obtener total actual
    let total=0;
    document.querySelectorAll('#fp-items .tabla-fila').forEach(r=>{
      const c=parseFloat(r.querySelector('.fpi-cant')?.value)||0;
      const p=parseFloat(r.querySelector('.fpi-precio')?.value)||0;
      total+=c*p;
    });
    const totalConInteres=total*(1+tasa.pct/100);
    const cuota=totalConInteres/3;
    if(det){
      det.innerHTML=`<div class="cond-pago-box">
<div class="cp-titulo">💳 Financiación en 3 cuotas · ${tasa.pct}% total</div>
<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
<span style="color:var(--gris)">Total sin interés:</span><span style="font-weight:600">${fmt(total)}</span>
</div>
<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
<span style="color:var(--gris)">Interés (${tasa.pct}%):</span><span style="font-weight:600;color:var(--azul)">${fmt(totalConInteres-total)}</span>
</div>
<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:10px;padding-top:8px;border-top:1px solid #b8d0e8">
<span>Total a pagar:</span><span style="color:var(--azul)">${fmt(totalConInteres)}</span>
</div>
<div class="cuotas-grid">
<div class="cuota-item"><div class="ci-num">Cuota 1</div><div class="ci-val">${fmt(cuota)}</div><div class="ci-sub">mes 1</div></div>
<div class="cuota-item"><div class="ci-num">Cuota 2</div><div class="ci-val">${fmt(cuota)}</div><div class="ci-sub">mes 2</div></div>
<div class="cuota-item"><div class="ci-num">Cuota 3</div><div class="ci-val">${fmt(cuota)}</div><div class="ci-sub">mes 3</div></div>
</div>
</div>`;
    }
  } else {
    if(opts)opts.style.display='none';
  }
}

function cargarImagen(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    formImgData=e.target.result;
    const prev=document.getElementById('img-preview');
    prev.src=formImgData; prev.style.display='block';
  };
  reader.readAsDataURL(file);
}

function actualizarNombreArchivo(){
  const p=formTipo==='presupuestos'?'fp':formTipo==='cuentas'?'cc':'ot';
  const num=document.getElementById('fp-num')?.value||document.getElementById('form-subtitle')?.textContent?.split('-')[1]||'001';
  const ap=document.getElementById(`${p}-apellido`)?.value||'';
  const no=document.getElementById(`${p}-nombre`)?.value||'';
  const de=document.getElementById(`${p}-desc`)?.value||'';
  const nombre=nomArchivo(formTipo,parseInt(num),ap,no,de);
  const el=document.getElementById(`${p}-nombre-archivo`);
  if(el)el.innerHTML=`<span>Nombre del archivo:</span>${nombre}`;
}

// ══ FILAS DINÁMICAS ══
let fiIdx=0,fcIdx=0,fpIdx=0;

function agregarFilaPresup(data){
  const i=fiIdx++;
  const cont=document.getElementById('fp-items');
  if(!cont)return;
  const d=data||{};
  const div=document.createElement('div');
  div.className='tabla-fila compras'; div.id=`fpi-${i}`;
  div.innerHTML=`<input type="date" class="fpi-fecha" value="${d.fecha||hoy()}">
<input type="text" class="fpi-desc" placeholder="Descripción..." value="${d.desc||''}">
<input type="number" class="fpi-cant" placeholder="1" value="${d.cant||''}" oninput="calcPresup()">
<input type="number" class="fpi-precio" placeholder="0" value="${d.precio||''}" oninput="calcPresup()">
<span class="total-cell fpi-total">${d.cant&&d.precio?fmt(d.cant*d.precio):'—'}</span>
<button class="del-btn" onclick="document.getElementById('fpi-${i}').remove();calcPresup()">✕</button>`;
  cont.appendChild(div);
  calcPresup();
}

function calcPresup(){
  let t=0;
  document.querySelectorAll('#fp-items .tabla-fila').forEach(r=>{
    const c=parseFloat(r.querySelector('.fpi-cant')?.value)||0;
    const p=parseFloat(r.querySelector('.fpi-precio')?.value)||0;
    const tot=c*p; r.querySelector('.fpi-total').textContent=tot>0?fmt(tot):'—'; t+=tot;
  });
  const el=document.getElementById('fp-total'); if(el)el.textContent=fmt(t);
  // Actualizar cálculo de cuotas si está activo
  if(document.getElementById('fp-condpago')?.value==='cc') actualizarCondPago();
}

function agregarFilaCompra(data){
  const i=fcIdx++;
  const cont=document.getElementById('cc-compras'); if(!cont)return;
  const d=data||{};
  const div=document.createElement('div');
  div.className='tabla-fila compras'; div.id=`fcc-${i}`;
  div.innerHTML=`<input type="date" class="fcc-fecha" value="${d.fecha||hoy()}">
<input type="text" class="fcc-desc" placeholder="Producto..." value="${d.desc||''}">
<input type="number" class="fcc-cant" placeholder="1" value="${d.cant||''}" oninput="calcCC()">
<input type="number" class="fcc-precio" placeholder="0" value="${d.precio||''}" oninput="calcCC()">

}

function agregarFilaPago(data){
  const i=fpIdx++;
  const cont=document.getElementById('cc-pagos'); if(!cont)return;
  const d=data||{};
  const div=document.createElement('div');
  div.className='tabla-fila pagos'; div.id=`fcp-${i}`;
  div.innerHTML=`<input type="date" class="fcp-fecha" value="${d.fecha||hoy()}">
<input type="text" class="fcp-forma" placeholder="Efectivo / Transf..." value="${d.forma||''}">
<input type="text" class="fcp-recibo" placeholder="001" value="${d.recibo||''}">
<input type="number" class="fcp-monto" placeholder="0" value="${d.monto||''}" oninput="calcCC()">
<button class="del-btn" onclick="document.getElementById('fcp-${i}').remove();calcCC()">✕</button>`;

function calcCC(){
  let tc=0;
  document.querySelectorAll('#cc-compras .tabla-fila').forEach(r=>{
    const c=parseFloat(r.querySelector('.fcc-cant')?.value)||0;
    const p=parseFloat(r.querySelector('.fcc-precio')?.value)||0;
    const t=c*p; r.querySelector('.fcc-total').textContent=t>0?fmt(t):'—'; tc+=t;
  });
  let tp=0;
  document.querySelectorAll('#cc-pagos .tabla-fila').forEach(r=>{tp+=parseFloat(r.querySelector('.fcp-monto')?.value)||0;});
  const saldo=tc-tp;
  const elC=document.getElementById('cc-total-compras'); if(elC)elC.textContent=fmt(tc);
  const elP=document.getElementById('cc-total-pagado'); if(elP)elP.textContent=fmt(tp);
  const elS=document.getElementById('cc-saldo'); if(elS)elS.textContent=fmt(saldo);
  const box=document.getElementById('cc-saldo-box'); if(box)box.style.background=saldo<=0?'var(--verde2)':'var(--rojo)';
}

// ══ GUARDAR ══
function guardarPresup(num){
  const items=[];
  document.querySelectorAll('#fp-items .tabla-fila').forEach(r=>{
    items.push({fecha:r.querySelector('.fpi-fecha')?.value||'',desc:r.querySelector('.fpi-desc')?.value||'',cant:parseFloat(r.querySelector('.fpi-cant')?.value)||0,precio:parseFloat(r.querySelector('.fpi-precio')?.value)||0});
  });
  const total=items.reduce((s,i)=>s+(i.cant*i.precio),0);
  const ap=document.getElementById('fp-apellido')?.value||'';
  const no=document.getElementById('fp-nombre')?.value||'';
  const de=document.getElementById('fp-desc')?.value||'';
  const estado=document.getElementById('fp-estado')?.value||'Pendiente';
  const condPago=document.getElementById('fp-condpago')?.value||'contado';
  const perfilCC=document.getElementById('fp-perfil')?.value||'sinHistorial';
  const obj={id:formId||Date.now(),num,fecha:document.getElementById('fp-fecha')?.value||hoy(),apellido:ap,nombre:no,desc:de,tel:document.getElementById('fp-tel')?.value||'',items,total,estado,prioridad:document.getElementById('fp-prioridad')?.value||'Normal',obs:document.getElementById('fp-obs')?.value||'',condPago,perfilCC,nombreArchivo:nomArchivo('presupuestos',num,ap,no,de)};
  const lista=DB.get('presupuestos');
  if(formId){const idx=lista.findIndex(i=>i.id===formId);if(idx>=0)lista[idx]=obj;else lista.push(obj);}
  else lista.push(obj);
  DB.set('presupuestos',lista);
  fiIdx=0;
  if(estado==='Aprobado'){
    if(confirm('✅ Presupuesto Aprobado\n¿Crear Orden de Trabajo automáticamente?')){
      crearOTdesdePresup(obj);
      return;
    }
  }
  volverDeForm(); actualizarStats();
}

function crearOTdesdePresup(presup){
  const num=DB.nextNum('ordenes');
  const desc=presup.items&&presup.items.length>0?presup.items.map(i=>i.desc).filter(Boolean).join(', '):presup.desc;
  const obj={id:Date.now(),num,fecha:hoy(),apellido:presup.apellido,nombre:presup.nombre,desc:desc||presup.desc,tel:presup.tel||'',operario:'',entrega:'',medidas:'',materiales:presup.items?presup.items.map(i=>`${i.cant}x ${i.desc}`).join('\n'):'',instrucciones:'',costo:presup.total||0,prioridad:presup.prioridad||'Normal',estado:'Pendiente',notas:'',presupOrigen:presup.nombreArchivo,presupId:presup.id,totalPresup:presup.total||0,condPago:presup.condPago||'contado',perfilCC:presup.perfilCC||'sinHistorial',nombreArchivo:nomArchivo('ordenes',num,presup.apellido,presup.nombre,desc),imagen:''};
  const lista=DB.get('ordenes'); lista.push(obj); DB.set('ordenes',lista);
  volverDeForm(); actualizarStats();
  setTimeout(()=>{irA('ordenes');setTimeout(()=>verDetalle('ordenes',obj.id),300);},300);
}

function eliminarItem(tipo,id){
  if(!confirm('¿Eliminar este registro?'))return;

// ══ FUNCIÓN CENTRAL DE IMPRESIÓN (iframe — funciona en Android) ══
function imprimirConIframe(htmlContent){
  // Eliminar iframe anterior si existe
  const viejo = document.getElementById('iframe-print');
  if(viejo) viejo.remove();

  const iframe = document.createElement('iframe');
  iframe.id = 'iframe-print';
  iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;background:#fff;';
  document.body.appendChild(iframe);

  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8">');
  doc.write('<meta name="viewport" content="width=device-width,initial-scale=1.0">');
  doc.write('<style>*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box;}body{margin:0;padding:0;font-family:Arial,sans-serif;}</style>');
  doc.write('</head><body>');
  doc.write(htmlContent);
  doc.write('</body></html>');
  doc.close();

  // Esperar a que cargue todo (imágenes incluidas) antes de imprimir
  iframe.onload = function(){
    setTimeout(()=>{
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
      // Cerrar iframe cuando el usuario termine (después de imprimir/cancelar)
      setTimeout(()=>{ iframe.remove(); }, 1500);
    }, 300);
  };
}

// ══ BANCO DE HORAS ══
const HORAS_DIA=8;
const DIAS_SEMANA=['Lun','Mar','Mié','Jue','Vie','Sáb'];
let horasWeekOffset=0,horasEmpleado='',horasDiaActivo=null;

function timeToMins(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function minsToHHMM(mins){const sign=mins<0?'-':'+';const abs=Math.abs(mins);const h=Math.floor(abs/60);const m=abs%60;return`${sign}${h}h ${String(m).padStart(2,'0')}m`;}
function calcBalanceDia(d){if(!d)return 0;if(d.ausente)return-HORAS_DIA*60;let w=0;const i=timeToMins(d.entrada),o=timeToMins(d.salida);if(i!==null&&o!==null&&o>i)w+=o-i;const ei=timeToMins(d.extraInicio),eo=timeToMins(d.extraFin);if(ei!==null&&eo!==null&&eo>ei)w+=eo-ei;return w-HORAS_DIA*60;}
function getWeekDates(offset){const d=new Date();const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff+offset*7);return DIAS_SEMANA.map((_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()+i);return dd;});}
function fmtD(date){return date.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});}
function getEmpleados(){return DB.get('empleados_horas')||[];}
function getHorasData(emp,wk){return DB.get(`horas_${emp}_${wk}`)||DIAS_SEMANA.map(()=>({entrada:'',salida:'',extraInicio:'',extraFin:'',ausente:false,nota:''}));}
function saveHorasData(emp,wk,data){DB.set(`horas_${emp}_${wk}`,data);}

function renderHoras(){
  const empleados=getEmpleados();
  if(!horasEmpleado&&empleados.length>0)horasEmpleado=empleados[0];
  const weekDates=getWeekDates(horasWeekOffset);
  const weekKey=weekDates[0].toISOString().slice(0,10);
  const weekData=horasEmpleado?getHorasData(horasEmpleado,weekKey):DIAS_SEMANA.map(()=>({entrada:'',salida:'',extraInicio:'',extraFin:'',ausente:false,nota:''}));
  const weekBalance=weekData.reduce((acc,d)=>acc+calcBalanceDia(d),0);
  let totalBalance=0;
  if(horasEmpleado){Object.keys(localStorage).filter(k=>k.startsWith(`mc_horas_${horasEmpleado}_`)).forEach(k=>{try{const data=JSON.parse(localStorage.getItem(k)||'[]');data.forEach(d=>{totalBalance+=calcBalanceDia(d);});}catch(e){}});}

  if(!horasEmpleado){html+=`<div class="empty-state"><div class="e-ico">⏱</div><p>Agregá un operario para empezar.</p></div>`;document.getElementById('horas-content').innerHTML=html;return;}

// ══ ÓRDENES DINÁMICAS ══
let otVista = 'semana'; // 'hoy' | 'semana' | 'todas'

function diasRestantesOT(item){
  const fecha = item.entrega || item.fechaEntrega;
  if(!fecha) return null;
  const hoyMs = new Date().setHours(0,0,0,0);
  const entMs = new Date(fecha).setHours(0,0,0,0);
  return Math.floor((entMs - hoyMs) / (1000*60*60*24));
}

function semColorOT(item){
  const estados_ok = ['Terminado','Entregado','Cancelado'];
  if(estados_ok.includes(item.estado)) return 'gris';
  const dias = diasRestantesOT(item);
  const prioMap = {'Urgente':3,'Alta':2,'Normal':1,'Baja':0};
  const prio = prioMap[item.prioridad]||0;
  if(dias === null) return prio >= 3 ? 'rojo' : prio >= 2 ? 'amarillo' : 'verde';
  if(dias < 0 || prio >= 3) return 'rojo';
  if(dias <= 2 || prio >= 2) return 'amarillo';
  if(dias <= 7) return 'amarillo';
  return 'verde';
}

function renderOrdenes(){
  const todas = DB.get('ordenes');
  const hoyMs = new Date().setHours(0,0,0,0);
  const finSemana = hoyMs + 7*24*60*60*1000;
  const activas = todas.filter(o=>!['Terminado','Entregado','Cancelado'].includes(o.estado));
  const terminadas = todas.filter(o=>['Terminado','Entregado'].includes(o.estado));

  // Filtrar por vista
  let items;
  if(otVista==='hoy'){
    items = activas.filter(o=>{
      const dias = diasRestantesOT(o);
      return dias !== null ? dias <= 0 : o.prioridad==='Urgente';
    });
  } else if(otVista==='semana'){
    items = activas.filter(o=>{
      const dias = diasRestantesOT(o);
      if(dias === null) return o.prioridad==='Urgente'||o.prioridad==='Alta';
      return dias <= 7;
    });
    // Sumar también las sin fecha urgentes/altas que no están en el filtro anterior
  } else {
    items = [...activas];
  }

  // Ordenar: primero por color semáforo (rojo > amarillo > verde), luego por días
  const orden = {rojo:0, amarillo:1, verde:2, gris:3};
  items.sort((a,b)=>{
    const ca = orden[semColorOT(a)], cb = orden[semColorOT(b)];
    if(ca!==cb) return ca-cb;
    const da = diasRestantesOT(a) ?? 999;
    const db = diasRestantesOT(b) ?? 999;
    return da - db;
  });

  // Conteos para tabs
  const countHoy = activas.filter(o=>{ const d=diasRestantesOT(o); return d!==null&&d<=0; }).length
    + activas.filter(o=>diasRestantesOT(o)===null&&o.prioridad==='Urgente').length;
  const countSemana = activas.filter(o=>{ const d=diasRestantesOT(o); return d!==null&&d<=7&&d>0; }).length
    + activas.filter(o=>diasRestantesOT(o)===null&&o.prioridad==='Alta').length;
  const countAtrasadas = activas.filter(o=>{ const d=diasRestantesOT(o); return d!==null&&d<0; }).length;

  let html = '';

  // Banner de alerta si hay atrasadas
  if(countAtrasadas > 0){
    html += `<div class="ot-banner rojo">⚠️ <strong>${countAtrasadas} orden${countAtrasadas>1?'es':''} atrasada${countAtrasadas>1?'s':''}</strong> — revisá fechas de entrega</div>`;
  } else if(activas.length === 0){
    html += `<div class="ot-banner verde">✅ Todo al día — no hay órdenes activas</div>`;
  }

  // Chips resumen
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
  if(countAtrasadas>0) html+=`<span class="ot-chip chip-rojo">🔴 ${countAtrasadas} atrasada${countAtrasadas>1?'s':''}</span>`;
  const urgentes = activas.filter(o=>o.prioridad==='Urgente').length;
  if(urgentes>0) html+=`<span class="ot-chip chip-rojo">🚨 ${urgentes} urgente${urgentes>1?'s':''}</span>`;
  const hoyCount = activas.filter(o=>{const d=diasRestantesOT(o);return d!==null&&d===0;}).length;
  if(hoyCount>0) html+=`<span class="ot-chip chip-amarillo">📅 ${hoyCount} vence hoy</span>`;
  html+=`<span class="ot-chip chip-azul">🔧 ${activas.length} activa${activas.length!==1?'s':''}</span>`;
  html += `</div>`;

  // Tabs
  html += `<div class="ot-tabs">
<button class="ot-tab${otVista==='hoy'?' active':''}" onclick="otVista='hoy';renderOrdenes()">
<span class="tab-num">${countHoy}</span>Hoy
</button>
<button class="ot-tab${otVista==='semana'?' active':''}" onclick="otVista='semana';renderOrdenes()">
<span class="tab-num">${countSemana + countHoy}</span>Esta semana
</button>
<button class="ot-tab${otVista==='todas'?' active':''}" onclick="otVista='todas';renderOrdenes()">
<span class="tab-num">${activas.length}</span>Todas
</button>
</div>`;

  // Buscador
  html += `<div class="search-bar"><span>🔍</span><input type="text" placeholder="Buscar cliente o trabajo..." id="buscar-ot" oninput="renderOrdenesFiltradas(this.value)"></div>`;

  // Lista
  html += `<div id="ot-lista">`;
  html += renderOTCards(items);
  html += `</div>`;

  // Terminadas (colapsadas)
  if(terminadas.length > 0){
    html += `<div style="margin-top:4px">
<button onclick="toggleTerminadas()" style="width:100%;background:var(--crema2);border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:600;color:var(--gris);cursor:pointer" id="btn-terminadas">
▸ Ver terminadas / entregadas (${terminadas.length})
</button>
<div id="lista-terminadas" style="display:none;margin-top:8px">${renderOTCards(terminadas)}</div>
</div>`;
  }

  document.getElementById('ordenes-content').innerHTML = html;
}

function renderOTCards(items){
  if(!items.length) return `<div class="empty-state"><div class="e-ico">✅</div><p>No hay órdenes en esta vista.</p></div>`;

  return items.map(item=>{
    const dias = diasRestantesOT(item);
    const color = semColorOT(item);
    const codigo = `OT-${String(item.num).padStart(3,'0')}`;
    const estados_ok = ['Terminado','Entregado','Cancelado'];
    const esTerminada = estados_ok.includes(item.estado);

    let diasLabel = '', diasNum = '—';
    if(esTerminada){
      diasNum = '✓'; diasLabel = item.estado;
    } else if(dias === null){
      diasNum = '?'; diasLabel = 'sin fecha';
    } else if(dias < 0){
      diasNum = Math.abs(dias); diasLabel = `día${Math.abs(dias)>1?'s':''} tarde`;
    } else if(dias === 0){
      diasNum = 'HOY'; diasLabel = 'entrega';
    } else {
      diasNum = dias; diasLabel = `día${dias>1?'s':''} restante${dias>1?'s':''}`;
    }

    // Próximo estado posible para cambio rápido
    const flujo = ['Pendiente','En progreso','Terminado'];
    const idxE = flujo.indexOf(item.estado);
    const proxEstado = idxE >= 0 && idxE < flujo.length-1 ? flujo[idxE+1] : null;

    return `<div class="ot-card" onclick="verDetalle('ordenes',${item.id})">
<div class="ot-card-header">
<div class="ot-sem sem-${color}">
<div class="dias-num">${diasNum}</div>
<div class="dias-label">${diasLabel}</div>
</div>
<div class="ot-body">
<div class="ot-body-top">
<span class="ot-codigo">${codigo}</span>
<div class="ot-badges">
<span class="item-badge ${badgeClass(item.estado)}">${item.estado||'Pendiente'}</span>
${item.prioridad&&item.prioridad!=='Normal'?`<span class="item-badge ${item.prioridad==='Urgente'?'badge-rojo':'badge-env'}">${item.prioridad}</span>`:''}
</div>
</div>
<div class="ot-nombre">${item.apellido||''} ${item.nombre||''}</div>
<div class="ot-desc">${item.desc||'—'}</div>
<div class="ot-footer">
${item.entrega?`<span class="ot-info-chip">📅 ${fmtF(item.entrega)}</span>`:''}
${item.operario?`<span class="ot-info-chip">👤 ${item.operario}</span>`:''}
${item.costo?`<span class="ot-info-chip">💰 ${fmt(item.costo)}</span>`:''}
${proxEstado&&!esTerminada?`<button class="ot-estado-btn" onclick="event.stopPropagation();cambiarEstadoOT(${item.id},'${proxEstado}')">→ ${proxEstado}</button>`:''}
</div>
</div>
</div>
</div>`;
  }).join('');
}

function renderOrdenesFiltradas(busq){
  const todas = DB.get('ordenes');
  const activas = todas.filter(o=>!['Terminado','Entregado','Cancelado'].includes(o.estado));
  const q = busq.toLowerCase();
  let items = (otVista==='hoy'?activas.filter(o=>{const d=diasRestantesOT(o);return d!==null&&d<=0||(d===null&&o.prioridad==='Urgente');}):
               otVista==='semana'?activas.filter(o=>{const d=diasRestantesOT(o);return d!==null&&d<=7||(d===null&&(o.prioridad==='Urgente'||o.prioridad==='Alta'));}):
               activas);
  if(q) items = items.filter(o=>`${o.apellido} ${o.nombre} ${o.desc} ${o.num}`.toLowerCase().includes(q));
  const orden = {rojo:0,amarillo:1,verde:2,gris:3};
  items.sort((a,b)=>{
    const ca=orden[semColorOT(a)],cb=orden[semColorOT(b)];
    if(ca!==cb)return ca-cb;
    return (diasRestantesOT(a)??999)-(diasRestantesOT(b)??999);
  });
  const el = document.getElementById('ot-lista');
  if(el) el.innerHTML = renderOTCards(items);
}

function cambiarEstadoOT(id, nuevoEstado){
  const lista = DB.get('ordenes');
  const idx = lista.findIndex(o=>o.id===id);
  if(idx<0) return;
  lista[idx].estado = nuevoEstado;
  DB.set('ordenes', lista);
  // Si pasa a En progreso y tiene total del presupuesto, ofrecer crear CC
  if(nuevoEstado==='En progreso'){
    const ot = lista[idx];
    const ccExistente = DB.get('cuentas').find(c=>c.otId===ot.id);
    if(!ccExistente && (ot.totalPresup||ot.costo)){
      setTimeout(()=>abrirModalCCdesdeOT(ot), 200);
      return;
    }
  }
  renderOrdenes();
}

// ══ CREAR CC DESDE OT ══
function abrirModalCCdesdeOT(ot){
  const total = ot.totalPresup || ot.costo || 0;
  const tasa = ot.condPago==='cc' ? (TASAS_CC[ot.perfilCC||'sinHistorial']||TASAS_CC.sinHistorial) : null;
  const totalFinal = tasa ? Math.round(total*(1+tasa.pct/100)) : total;

  const modal = document.createElement('div');
  modal.className='modal-overlay'; modal.id='modal-cc-ot';
  modal.onclick = (e)=>{ if(e.target===modal) cerrarModalCCOT(); };
  modal.innerHTML=`<div class="modal-box" onclick="event.stopPropagation()">
<h3>💰 Crear Cuenta Corriente</h3>
<p style="font-size:13px;color:var(--gris);margin-bottom:14px">OT iniciada para <strong>${ot.apellido} ${ot.nombre}</strong><br>${ot.desc||''}</p>

<div style="background:var(--crema2);border-radius:10px;padding:12px;margin-bottom:14px">
<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
<span style="color:var(--gris)">Total del trabajo:</span>
<span style="font-weight:700">${fmt(total)}</span>
</div>
${tasa?`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
<span style="color:var(--gris)">Interés CC (${tasa.pct}%):</span>
<span style="font-weight:700;color:var(--azul)">${fmt(totalFinal-total)}</span>
</div>
<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding-top:6px;border-top:1px solid var(--crema3)">
<span>Total a cobrar:</span><span style="color:var(--azul)">${fmt(totalFinal)}</span>
</div>`:''}
</div>

<div class="form-row">
<label>% de seña inicial</label>
<div style="display:flex;align-items:center;gap:10px">
<input type="range" id="cc-pct" min="0" max="100" step="5" value="50"
  oninput="actualizarModalCC(${totalFinal})"
  style="flex:1;accent-color:var(--naranja)">
<span id="cc-pct-label" style="font-weight:700;font-size:16px;color:var(--naranja);min-width:40px">50%</span>
</div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px" id="cc-montos">
<div style="background:var(--verde-cl);border-radius:10px;padding:10px;text-align:center">
<div style="font-size:10px;font-weight:600;color:var(--verde);text-transform:uppercase;margin-bottom:3px">Seña inicial</div>
<div style="font-size:18px;font-weight:700;color:var(--verde)" id="cc-monto-senia">${fmt(totalFinal*0.5)}</div>
</div>
<div style="background:var(--azul-cl);border-radius:10px;padding:10px;text-align:center">
<div style="font-size:10px;font-weight:600;color:var(--azul);text-transform:uppercase;margin-bottom:3px">Saldo al entregar</div>
<div style="font-size:18px;font-weight:700;color:var(--azul)" id="cc-monto-saldo">${fmt(totalFinal*0.5)}</div>
</div>
</div>

<div class="form-row">
<label>¿Registrar seña como pago recibido?</label>
<select id="cc-senia-recibida" style="width:100%;border:1.5px solid var(--crema3);border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--crema);outline:none">
<option value="si">Sí — ya cobré la seña</option>
<option value="no">No — todavía no la recibí</option>
</select>
</div>

<div class="btn-row" style="margin-top:4px">
<button class="btn btn-secondary" onclick="cerrarModalCCOT();renderOrdenes()">Omitir</button>
<button class="btn btn-primary" onclick="crearCCdesdeOT(${ot.id},${totalFinal})">Crear CC</button>
</div>
</div>`;
  document.body.appendChild(modal);
}

function actualizarModalCC(total){
  const pct = parseInt(document.getElementById('cc-pct')?.value||50);
  const senia = Math.round(total * pct / 100);
  const saldo = total - senia;
  const lbl = document.getElementById('cc-pct-label');
  const ms = document.getElementById('cc-monto-senia');
  const msa = document.getElementById('cc-monto-saldo');
  if(lbl) lbl.textContent = pct+'%';
  if(ms) ms.textContent = fmt(senia);
  if(msa) msa.textContent = fmt(saldo);
}

function cerrarModalCCOT(){
  document.getElementById('modal-cc-ot')?.remove();
}

function crearCCdesdeOT(otId, totalFinal){
  const ot = DB.get('ordenes').find(o=>o.id===otId);
  if(!ot) return;
  const pct = parseInt(document.getElementById('cc-pct')?.value||50);
  const seniaRecibida = document.getElementById('cc-senia-recibida')?.value==='si';
  const montoSenia = Math.round(totalFinal * pct / 100);
  const montoSaldo = totalFinal - montoSenia;

  const num = DB.nextNum('cuentas');
  const compras = [{
    fecha: hoy(),
    desc: ot.desc || 'Trabajo de carpintería',
    cant: 1,
    precio: totalFinal
  }];
  const pagos = seniaRecibida && montoSenia > 0 ? [{
    fecha: hoy(),
    forma: 'Seña inicial',
    recibo: '',
    monto: montoSenia
  }] : [];

  const saldoPendiente = totalFinal - pagos.reduce((s,p)=>s+p.monto,0);
  const estado = saldoPendiente <= 0 ? 'Pagado' : seniaRecibida ? 'Al día' : 'Pendiente';

  const cc = {
    id: Date.now(),
    num,
    fecha: hoy(),
    apellido: ot.apellido,
    nombre: ot.nombre,
    desc: ot.desc,
    tel: ot.tel||'',
    compras,
    pagos,
    estado,
    obs: `Cuenta generada desde OT-${String(ot.num).padStart(3,'0')}${ot.presupOrigen?' · Presup: '+ot.presupOrigen:''}`,
    otId: otId,
    otNum: ot.num,
    presupOrigen: ot.presupOrigen||'',
    montoSenia,
    montoSaldo,
    nombreArchivo: nomArchivo('cuentas', num, ot.apellido, ot.nombre, ot.desc)
  };

  const listaCC = DB.get('cuentas');
  listaCC.push(cc);
  DB.set('cuentas', listaCC);

  // Guardar el ccId en la OT para el link
  const listaOT = DB.get('ordenes');
  const idx = listaOT.findIndex(o=>o.id===otId);
  if(idx>=0){ listaOT[idx].ccId = cc.id; listaOT[idx].ccNum = num; DB.set('ordenes', listaOT); }

  cerrarModalCCOT();
  actualizarStats();
  renderOrdenes();

  // Confirmar y ofrecer ir a la CC
  if(confirm(`✅ Cuenta Corriente CC-${String(num).padStart(3,'0')} creada para ${ot.apellido} ${ot.nombre}\n\nSeña: ${fmt(montoSenia)}\nSaldo pendiente: ${fmt(montoSaldo)}\n\n¿Ir a la cuenta corriente ahora?`)){
    setTimeout(()=>{ irA('cuentas'); setTimeout(()=>verDetalle('cuentas', cc.id), 300); }, 200);
  }
}

function toggleTerminadas(){
  const div = document.getElementById('lista-terminadas');
  const btn = document.getElementById('btn-terminadas');
  if(!div||!btn) return;
  const abierto = div.style.display!=='none';
  div.style.display = abierto?'none':'block';
  btn.textContent = abierto?`▸ Ver terminadas / entregadas`:`▾ Ocultar terminadas`;
}

// ══ INIT ══
actualizarStats();
</script>
</body>
</html>
